name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_failure_notification:
        description: Send a safe notification test
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:once

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply divine-crossposter --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy

      - name: Smoke test production
        run: |
          set -euo pipefail

          check() {
            url="$1"
            pattern="$2"
            for attempt in $(seq 1 12); do
              body="$(curl --fail --silent --show-error \
                --connect-timeout 5 --max-time 20 \
                --retry 2 --retry-all-errors \
                "$url" || true)"
              if printf '%s' "$body" | grep -Fq "$pattern"; then
                return 0
              fi
              echo "Attempt $attempt failed for $url"
              sleep 10
            done

            echo "Timed out waiting for $url to contain expected content" >&2
            exit 1
          }

          check_platform_enabled() {
            url="$1"
            platform="$2"
            for attempt in $(seq 1 12); do
              body="$(curl --fail --silent --show-error \
                --connect-timeout 5 --max-time 20 \
                --retry 2 --retry-all-errors \
                "$url" || true)"
              if printf '%s' "$body" | jq -e \
                --arg platform "$platform" \
                '.platforms | any(.[]; .platform == $platform and .enabled == true)' \
                >/dev/null 2>&1; then
                return 0
              fi
              echo "Attempt $attempt failed for platform $platform"
              sleep 10
            done

            echo "Timed out waiting for platform $platform to be enabled" >&2
            exit 1
          }

          check "https://crossposter.divine.video/health" '"ok":true'
          check "https://crossposter.divine.video/" 'Login with Divine'
          check "https://crossposter.divine.video/platforms" 'Provider status'
          check_platform_enabled "https://crossposter.divine.video/platforms?format=json" instagram
          check_platform_enabled "https://crossposter.divine.video/platforms?format=json" x

  notify:
    if: ${{ always() && (inputs.test_failure_notification == true || needs.test.result == 'failure' || needs.deploy.result == 'failure') }}
    needs: [test, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Notify workflow failure
        env:
          OPS_ALERT_WEBHOOK_URL: ${{ secrets.OPS_ALERT_WEBHOOK_URL }}
          NOTIFICATION_TEST: ${{ inputs.test_failure_notification }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${OPS_ALERT_WEBHOOK_URL:-}" ]; then
            echo "::error::OPS_ALERT_WEBHOOK_URL is missing or inaccessible to this workflow"
            exit 1
          fi

          event=workflow_failed
          if [ "$NOTIFICATION_TEST" = true ]; then
            event=notification_test
          fi

          payload="$(jq -cn \
            --arg service divine-crossposter \
            --arg event "$event" \
            --arg run_url "$RUN_URL" \
            '{service: $service, event: $event, runUrl: $run_url}')"
          curl --fail --silent --show-error \
            --connect-timeout 5 --max-time 30 \
            --retry 3 --retry-all-errors \
            --header 'content-type: application/json' \
            --data-binary "$payload" \
            "$OPS_ALERT_WEBHOOK_URL"
