name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:once

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply divine-crossposter --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy

      - name: Smoke test production
        run: |
          set -euo pipefail

          check() {
            url="$1"
            pattern="$2"
            for attempt in $(seq 1 12); do
              body="$(curl -fsS "$url" || true)"
              if printf '%s' "$body" | grep -Fq "$pattern"; then
                return 0
              fi
              echo "Attempt $attempt failed for $url"
              sleep 10
            done

            echo "Timed out waiting for $url to contain expected content" >&2
            exit 1
          }

          check "https://crossposter.divine.video/health" '"ok":true'
          check "https://crossposter.divine.video/" 'Login with Divine'
          check "https://crossposter.divine.video/platforms" 'Provider status'
          check "https://crossposter.divine.video/platforms?format=json" '"platform":"instagram","enabled":true'
